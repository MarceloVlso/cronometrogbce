<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Gracie Barra</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body tabindex="0">

    <img src="images/logogb.png" id="logo">

    <div id="horario">Horário: 00:00:00</div>

    <div id="modo">TREINO</div>

    <div id="timer">05:00</div>

    <div id="info">
        ENTER = START/PAUSE | ↑ ↓ = AJUSTAR | ← = RESET
    </div>

    <audio id="beep" preload="auto">
        <source src="sounds/beep.mp3" type="audio/mpeg">
    </audio>

    <script src="js/main.js"></script>
</body>
</html>
